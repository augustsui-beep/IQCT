<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQC Quality Dashboard | Pareto Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <style>
        body { background-color: #0B0F19; color: #E2E8F0; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #111827; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 10px; }
    </style>
</head>
<body class="custom-scrollbar">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;
        const { 
            ComposedChart, Bar, Line, XAxis, YAxis, CartesianGrid, 
            Tooltip, ResponsiveContainer, ReferenceLine, Cell, Legend 
        } = Recharts;

        // 模擬數據 (來自原檔案)
        const VENDOR_DATA = [
            {name:"Ablecom",lots:1599,defects:73},
            {name:"Lite-On",lots:241,defects:49},
            {name:"Kaori",lots:145,defects:55},
            {name:"TAFA",lots:96,defects:67},
            {name:"Vericool",lots:71,defects:79},
            {name:"Compuware",lots:702,defects:4},
            {name:"Delta TH",lots:195,defects:7},
            {name:"Demos",lots:61,defects:3}
        ];

        // Pareto 組件
        const ParetoChart = ({ data }) => {
            const chartData = useMemo(() => {
                const sorted = [...data].sort((a, b) => b.defects - a.defects);
                const total = sorted.reduce((sum, item) => sum + item.defects, 0);
                let acc = 0;
                return sorted.map(item => {
                    const prevAcc = acc;
                    acc += item.defects;
                    return {
                        ...item,
                        cumulative: (acc / total) * 100,
                        isTop: (prevAcc / total) * 100 < 80
                    };
                });
            }, [data]);

            return (
                <div className="h-[400px] w-full mt-4">
                    <ResponsiveContainer>
                        <ComposedChart data={chartData} margin={{ top: 20, right: 30, left: 0, bottom: 0 }}>
                            <CartesianGrid strokeDasharray="3 3" stroke="#1E293B" vertical={false} />
                            <XAxis dataKey="name" tick={{fill: '#64748B', fontSize: 12}} axisLine={false} />
                            <YAxis yAxisId="left" tick={{fill: '#64748B'}} axisLine={false} />
                            <YAxis yAxisId="right" orientation="right" domain={[0, 100]} tickFormatter={v => v + '%'} tick={{fill: '#64748B'}} axisLine={false} />
                            <Tooltip contentStyle={{backgroundColor: '#111827', borderColor: '#1E293B'}} />
                            <Bar yAxisId="left" dataKey="defects" name="Defects" radius={[4, 4, 0, 0]}>
                                {chartData.map((entry, index) => (
                                    <Cell key={index} fill={entry.isTop ? "#EF4444" : "#3B82F6"} />
                                ))}
                            </Bar>
                            <Line yAxisId="right" dataKey="cumulative" name="Cumulative %" stroke="#F59E0B" strokeWidth={3} dot={{r: 4}} />
                            <ReferenceLine yAxisId="right" y={80} stroke="#10B981" strokeDasharray="5 5" label={{value: '80% 門檻', position: 'insideTopLeft', fill: '#10B981', fontSize: 12}} />
                            <Legend />
                        </ComposedChart>
                    </ResponsiveContainer>
                </div>
            );
        };

        function App() {
            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-7xl mx-auto mb-8">
                        <div className="flex items-center gap-4">
                            <div className="bg-blue-600 p-2 rounded-lg">📊</div>
                            <div>
                                <h1 className="text-2xl font-bold text-white tracking-tight">IQC 品質戰情室</h1>
                                <p className="text-slate-400 text-sm">柏拉圖分析 (Pareto Analysis) - 供應商不良品統計</p>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto grid grid-cols-1 gap-6">
                        <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-lg font-semibold text-slate-100 uppercase tracking-widest">Vendor Failures Pareto</h2>
                                <span className="bg-blue-500/10 text-blue-400 text-xs px-2 py-1 rounded border border-blue-500/20">Real-time Data</span>
                            </div>
                            
                            <ParetoChart data={VENDOR_DATA} />

                            <div className="mt-8 grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div className="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                                    <p className="text-slate-500 text-xs mb-1">主要改善對象 (80%)</p>
                                    <p className="text-xl font-bold text-red-400">Top 5 Vendors</p>
                                </div>
                                <div className="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                                    <p className="text-slate-500 text-xs mb-1">累計不良數</p>
                                    <p className="text-xl font-bold text-amber-400">331 Units</p>
                                </div>
                                <div className="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                                    <p className="text-slate-500 text-xs mb-1">建議行動</p>
                                    <p className="text-xl font-bold text-emerald-400">SCAR Review</p>
                                </div>
                            </div>
                        </div>
                    </main>
                    
                    <footer className="max-w-7xl mx-auto mt-8 text-center text-slate-600 text-[10px]">
                        Supermicro IQC Dashboard System © 2026
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
